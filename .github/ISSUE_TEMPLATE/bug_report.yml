name: Bug report
description: Report a problem with Solar AI Optimizer
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start with `docker compose up -d`
        2. Open Settings and ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0 or git commit"
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Home Assistant add-on
        - Proxmox LXC
        - Local development
        - Other
    validations:
      required: true
  - type: dropdown
    id: ha_integration
    attributes:
      label: Home Assistant integration
      description: Are you using the HACS Solar AI Optimizer integration?
      options:
        - Yes (HACS / custom component)
        - No (YAML fail-safe or none)
        - Not applicable
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste log excerpts (redact tokens and secrets).
