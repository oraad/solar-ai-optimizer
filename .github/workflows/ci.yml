name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify Python 3.14+
        run: bash scripts/check-python.sh
      - name: Verify version files match VERSION
        run: python scripts/sync-version.py --check
      - name: Verify HA app data-dir wiring
        run: bash scripts/test-run-sh-data-dir.sh
      - uses: docker/setup-buildx-action@v4
      - name: Build test image
        run: docker compose build test
      - name: Run backend tests
        run: docker compose run --rm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build frontend test image
        run: docker compose build frontend-test
      - name: Run frontend tests
        run: docker compose run --rm frontend-test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -r requirements-docs.txt
      - run: python scripts/check_docs_i18n.py
      - run: mkdocs build --strict

  build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build production image
        run: docker compose build solar
      - name: Verify OCI metadata on production image
        run: |
          docker image inspect solar-ai-optimizer --format '{{json .Config.Labels}}' | grep -q 'org.opencontainers.image.title'
          docker image inspect solar-ai-optimizer --format '{{json .Config.Entrypoint}}' | grep -q '/app/run.sh'
          docker image inspect solar-ai-optimizer --format '{{json .Config.ExposedPorts}}' | grep -q '8000/tcp'
      - name: Verify Docker CLI for dashboard self-update
        run: |
          docker run --rm --entrypoint sh solar-ai-optimizer -c 'command -v docker && docker --version'
      - name: Verify Python 3.14+ in production image
        run: |
          docker run --rm --entrypoint python solar-ai-optimizer \
            -c "import sys; assert sys.version_info >= (3, 14), sys.version"