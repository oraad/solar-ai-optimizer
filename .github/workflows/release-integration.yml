name: Release (integration)

on:
  push:
    tags:
      - "integration-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify integration release tag matches INTEGRATION_VERSION
        run: |
          tag="${GITHUB_REF_NAME#integration-v}"
          integration="$(tr -d '\r\n' < INTEGRATION_VERSION)"
          test "$integration" = "$tag"
          manifest="$(python -c "import json; print(json.load(open('custom_components/solar_ai_optimizer/manifest.json'))['version'])")"
          test "$manifest" = "$integration"
          echo "tag=$tag integration=$integration manifest=$manifest"

      - name: Package HA integration zip
        run: |
          sudo apt-get update && sudo apt-get install -y zip unzip
          bash scripts/package-ha-integration.sh
          unzip -l dist/solar_ai_optimizer.zip | head -n 40

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Prepare release notes from CHANGELOG
        run: |
          bash scripts/check-python.sh
          tag="${GITHUB_REF_NAME#integration-v}"
          if python scripts/changelog-excerpt.py --kind integration --version "$tag" > release-notes.md; then
            echo "Using CHANGELOG excerpt for integration $tag"
          else
            echo "No CHANGELOG section for integration $tag — release will use auto-generated notes only"
            rm -f release-notes.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body_path: release-notes.md
          files: |
            dist/solar_ai_optimizer.zip
          fail_on_unmatched_files: true
