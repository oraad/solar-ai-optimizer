name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify release tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          test "$(cat VERSION)" = "$tag"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/oraad/solar-ai-optimizer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            INSTALL_EXTRAS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Prepare release notes from CHANGELOG
        run: |
          bash scripts/check-python.sh
          tag="${GITHUB_REF_NAME#v}"
          if python scripts/changelog-excerpt.py --version "$tag" > release-notes.md; then
            echo "Using CHANGELOG excerpt for v$tag"
          else
            echo "No CHANGELOG section for v$tag — release will use auto-generated notes only"
            rm -f release-notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: release-notes.md
          fail_on_unmatched_files: false
