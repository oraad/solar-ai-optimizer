name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify release tag matches VERSION and integration manifest
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(tr -d '\r\n' < VERSION)"
          test "$version" = "$tag"
          manifest="$(python -c "import json; print(json.load(open('custom_components/solar_ai_optimizer/manifest.json'))['version'])")"
          test "$manifest" = "$tag"
          echo "tag=$tag version=$version manifest=$manifest"

      - name: Package HA integration zip
        run: |
          sudo apt-get update && sudo apt-get install -y zip unzip
          bash scripts/package-ha-integration.sh
          unzip -l dist/solar_ai_optimizer.zip | head -n 40

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/oraad/solar-ai-optimizer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            INSTALL_EXTRAS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Prepare release notes from CHANGELOG
        run: |
          bash scripts/check-python.sh
          tag="${GITHUB_REF_NAME#v}"
          if python scripts/changelog-excerpt.py --version "$tag" > release-notes.md; then
            echo "Using CHANGELOG excerpt for v$tag"
          else
            echo "No CHANGELOG section for v$tag â€” release will use auto-generated notes only"
            rm -f release-notes.md
          fi

      # Single softprops create: Docker is already on GHCR; attach HA zip once.
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body_path: release-notes.md
          files: |
            dist/solar_ai_optimizer.zip
          fail_on_unmatched_files: true
