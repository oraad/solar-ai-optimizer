[mypy]
python_version = 3.14
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
ignore_missing_imports = true
exclude = (?x)(
    /tests/
  | /tests$
  )

[mypy-custom_components.solar_ai_optimizer.tests.*]
ignore_errors = true

[mypy-homeassistant.*]
ignore_missing_imports = true

[mypy-voluptuous.*]
ignore_missing_imports = true

[mypy-aiohttp.*]
ignore_missing_imports = true
