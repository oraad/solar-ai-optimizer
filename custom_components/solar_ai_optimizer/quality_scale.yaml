# Internal IQS checklist for the HACS custom integration.
# Rule names are kebab-case (hassfest ALL_RULES). Custom integrations are not
# Core-badged; this file tracks Platinum-shaped quality without manifest.quality_scale.
rules:
  # Bronze
  action-setup:
    status: exempt
    comment: No domain services are registered.
  action-exceptions:
    status: exempt
    comment: No domain services are registered.
  appropriate-polling: done
  brands:
    status: exempt
    comment: >
      Local brand/ assets ship with the integration; home-assistant/brands
      registration is out of scope for this HACS-only component.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No domain services are registered.
  docs-conditions:
    status: exempt
    comment: No device/entity conditions are provided.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: No device/entity triggers are provided.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Manual host URL and pairing code; no network discovery.
  discovery-update-info:
    status: exempt
    comment: No discovery; reconfigure flow updates host/SSL.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: One Solar install device per config entry.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: Single static device per install; no multi-device lifetime.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
