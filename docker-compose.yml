services:
  solar:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        INSTALL_EXTRAS: "1"
    image: solar-ai-optimizer
    container_name: solar-optimizer
    restart: unless-stopped
    # No .env or config.yaml required: configure everything (including the Home
    # Assistant URL/token) from the dashboard Settings panel. It is persisted to
    # the solar-data volume. The variables below are optional defaults; you may
    # override or add any Settings env var here (HA_BASE_URL, HA_TOKEN,
    # SHADOW_MODE, LOG_LEVEL, SOLCAST_API_KEY, ...).
    environment:
      SHADOW_MODE: "true"
      LOG_LEVEL: INFO
      # LOG_FORMAT: json  # optional: JSON logs for aggregators
      # API_TOKEN: "change-me"  # optional: protect mutating /api endpoints
      DATA_DIR: /app/data
      DATABASE_URL: sqlite+aiosqlite:////app/data/solar.db
      DEMO_MODE: ${DEMO_MODE:-false}
      TRUST_INGRESS_HEADERS: ${TRUST_INGRESS_HEADERS:-false}
    # Optionally load extra env from a file if you choose to create one:
    # env_file:
    #   - path: .env
    #     required: false
    volumes:
      - solar-data:/app/data
    ports:
      # Dashboard + API are served together on 8000.
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        INSTALL_EXTRAS: "1"
    image: solar-ai-optimizer-test
    entrypoint: []

  frontend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: solar-ai-optimizer-frontend-test
    working_dir: /ui
    volumes:
      - ./frontend:/ui
      - frontend-node-modules:/ui/node_modules
    command: ["npm", "test"]

  mcp-stdio:
    profiles: ["mcp"]
    image: solar-ai-optimizer
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        INSTALL_EXTRAS: "1"
        INSTALL_MCP: "1"
    entrypoint: ["python", "-m", "app.mcp", "stdio"]
    environment:
      SOLAR_API_URL: http://host.docker.internal:8000
      MCP_TOKEN: ${MCP_TOKEN:-}
      API_TOKEN: ${API_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      solar:
        condition: service_healthy

  # Docs screenshots — Playwright image + cached node_modules (profile: docs).
  # Pin: Dockerfile docs-screenshots stage ↔ frontend/package.json playwright version.
  docs-screenshots:
    profiles: ["docs"]
    build:
      context: .
      dockerfile: Dockerfile
      target: docs-screenshots
    image: solar-ai-optimizer-docs-screenshots
    working_dir: /ui
    volumes:
      - ./frontend:/ui
      - ./docs:/docs
      - frontend-node-modules:/ui/node_modules
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      SCREENSHOT_BASE_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["npm", "run", "docs:screenshots"]

volumes:
  solar-data:
  frontend-node-modules:
