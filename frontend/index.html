<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0e13" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./brand-mark.png" />
    <title>Solar AI Optimizer</title>
    <!-- Ingress subpath: trailing slash + base href so relative assets resolve correctly. -->
    <script>
      (function () {
        var p = location.pathname;
        var m = p.match(/^(\/api\/(?:hassio_ingress|ingress)\/[^/]+)/);
        if (!m) return;
        var prefix = m[1];
        if (p === prefix) {
          location.replace(prefix + "/" + location.search + location.hash);
          return;
        }
        var base = document.createElement("base");
        base.href = prefix + "/";
        document.head.appendChild(base);
      })();
    </script>
    <!-- Apply the saved theme before first paint to avoid a flash.
         On first visit (no saved preference) honour prefers-color-scheme. -->
    <script>
      try {
        var t = localStorage.getItem("solar-theme");
        if (t) {
          document.documentElement.setAttribute("data-theme", t);
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (e) {}
    </script>
    <!-- Apply saved locale direction before first paint (en/ar/fr; extend LOCALE_DIR_INLINE in manifest). -->
    <script>
      try {
        var loc = localStorage.getItem("solar-locale");
        var dirs = { en: "ltr", ar: "rtl", fr: "ltr" };
        if (loc && dirs[loc]) {
          document.documentElement.lang = loc;
          document.documentElement.dir = dirs[loc];
        }
      } catch (e) {}
    </script>
    <style>
      /* Design tokens live on :root (light DOM) so they inherit into every
         web component's shadow tree and can be switched by [data-theme]. */
      :root {
        --bg: #0b0e13;
        --panel: #151a21;
        --panel-2: #1c222b;
        --panel-3: #232a34;
        --border: #2a313c;
        --track: #2a313c;
        --border-strong: #39414e;
        --text: #e6e9ef;
        --muted: #94a0b0;
        --accent: #ffb020;
        --accent-2: #4cc2ff;
        --good: #2fbf71;
        --warn: #f0a202;
        --bad: #e5484d;
        --critical: #ff2d55;
        --radius: 14px;
        --radius-sm: 9px;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
        --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4);
        --ring: 0 0 0 3px rgba(76, 194, 255, 0.35);
        /* Responsive density (shrunk via media queries below). */
        --app-pad: 20px;
        --card-pad: 18px;
        --gap: 16px;
        --metric: 2rem;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        color-scheme: dark;
      }
      @media (max-width: 760px) {
        :root { --app-pad: 12px; --card-pad: 14px; --gap: 12px; --metric: 1.6rem; }
      }
      @media (max-width: 460px) {
        :root { --app-pad: 10px; --card-pad: 12px; --gap: 10px; --metric: 1.4rem; }
      }
      html[data-theme="light"] {
        --bg: #eef1f6;
        --panel: #ffffff;
        --panel-2: #f3f6fa;
        --panel-3: #e8edf4;
        --border: #dce2ea;
        --track: #dce2ea;
        --border-strong: #c5cdd9;
        --text: #121722;
        --muted: #5b6675;
        --accent: #d98a05;
        --accent-2: #1a86c7;
        --good: #1ea863;
        --warn: #b9790a;
        --bad: #d23b40;
        --critical: #e11d48;
        --shadow: 0 1px 2px rgba(16, 24, 40, 0.06), 0 8px 24px rgba(16, 24, 40, 0.08);
        --shadow-lg: 0 12px 40px rgba(16, 24, 40, 0.14);
        --ring: 0 0 0 3px rgba(26, 134, 199, 0.3);
        color-scheme: light;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow-x: hidden;
      }
      body {
        background:
          radial-gradient(1100px 600px at 100% -10%, rgba(255, 176, 32, 0.06), transparent 60%),
          radial-gradient(1000px 700px at -10% 0%, rgba(76, 194, 255, 0.06), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.25s ease, color 0.25s ease;
      }
      /* Pleasant scrollbars across the app. */
      * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      *::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: padding-box; }
      /* Boot splash: paints before JS loads (HA ingress iframe). */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        background:
          radial-gradient(1100px 600px at 100% -10%, rgba(255, 176, 32, 0.06), transparent 60%),
          radial-gradient(1000px 700px at -10% 0%, rgba(76, 194, 255, 0.06), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        transition: opacity 0.2s ease;
      }
      #boot-splash.boot-splash-out {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .boot-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }
      #boot-splash .boot-splash-mark {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: linear-gradient(150deg, var(--accent), var(--accent-2));
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      #boot-splash .boot-splash-mark img {
        width: 30px;
        height: 30px;
        object-fit: contain;
        display: block;
      }
      #boot-splash h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      #boot-splash .boot-splash-sub {
        margin: 0;
        font-size: 0.82rem;
        color: var(--muted);
      }
      #boot-splash .boot-splash-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--muted);
        border-top-color: var(--accent-2);
        border-radius: 50%;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-splash-spinner {
          animation: none;
          border-top-color: var(--muted);
        }
        #boot-splash {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-busy="true" aria-label="Loading Solar AI Optimizer">
      <div class="boot-splash-inner">
        <span class="boot-splash-mark" aria-hidden="true">
          <img src="./brand-mark.png" alt="" width="30" height="30" />
        </span>
        <h1>Solar AI Optimizer</h1>
        <p class="boot-splash-sub">Verifying access…</p>
        <span class="boot-splash-spinner" aria-hidden="true"></span>
      </div>
    </div>
    <solar-app></solar-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
